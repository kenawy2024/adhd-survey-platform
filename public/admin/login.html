<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول - لوحة تحكم ADHD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/admin.css"/>
  <meta name="robots" content="noindex"/>
</head>
<body class="admin-body">

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🧠</div>
      <h2>لوحة تحكم ADHD</h2>
      <p>سجّل دخولك للوصول إلى لوحة التحكم</p>
    </div>

    <div class="login-error" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">اسم المستخدم</label>
        <input type="text" id="username" class="form-control" placeholder="أدخل اسم المستخدم" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:1rem;font-size:1rem;" id="loginBtn">
        🔐 تسجيل الدخول
      </button>
    </form>

    <div style="margin-top:1.5rem;text-align:center;">
      <a href="/" style="font-size:.85rem;color:#64748b;">← العودة للموقع</a>
    </div>

    <div style="margin-top:1.5rem;padding:1rem;background:#f8fafc;border-radius:8px;font-size:.8rem;color:#94a3b8;text-align:center;">
      للتجربة: admin / admin123
    </div>
  </div>
</div>

<script>
// Redirect if already logged in
if (localStorage.getItem('adminToken')) {
  window.location.href = '/admin/dashboard.html';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = '⏳ جاري التحقق...';
  btn.disabled = true;
  document.getElementById('loginError').style.display = 'none';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUsername', data.username);
      window.location.href = '/admin/dashboard.html';
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = data.message || 'بيانات الدخول غير صحيحة';
      btn.textContent = '🔐 تسجيل الدخول';
      btn.disabled = false;
    }
  } catch(e) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = 'خطأ في الاتصال بالخادم';
    btn.textContent = '🔐 تسجيل الدخول';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
